version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ghostmarket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ghostmarket_dev
    ports:
      - "5555:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
